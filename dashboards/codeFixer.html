<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>aiDash CodeFixer v1.5.0</title>
    <style>
        :root { --accent: #00ff88; --bg: #0a0a0a; --panel: #161616; --error: #ff4444; --console: #1a1a1a; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: #e0e0e0; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: #000; padding: 15px 25px; border-bottom: 2px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .brand h1 { margin: 0; font-size: 1.8rem; color: var(--accent); letter-spacing: -1px; }

        .toolbar { background: #111; padding: 10px 20px; display: flex; gap: 15px; align-items: center; border-bottom: 1px solid #222; }
        .btn { background: #222; color: var(--accent); border: 1px solid #444; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-weight: bold; font-family: monospace; transition: 0.2s; }
        .btn:hover { background: var(--accent); color: #000; }
        
        .main-layout { display: grid; grid-template-columns: 1fr 380px; flex-grow: 1; height: calc(100vh - 220px); }
        #editor { background: #050505; color: #d4d4d4; padding: 20px; border: none; resize: none; font-size: 15px; font-family: 'Consolas', monospace; line-height: 1.5; outline: none; border-right: 1px solid #222; width: 100%; box-sizing: border-box; }
        
        .sidebar { background: var(--panel); padding: 20px; display: flex; flex-direction: column; gap: 12px; border-left: 1px solid #333; }
        #instructionInput { background: #000; color: #fff; border: 1px solid #444; padding: 12px; height: 100px; border-radius: 4px; font-size: 0.9rem; resize: none; }

        /* Error Console Area */
        .console-area { background: var(--console); height: 100px; border-top: 2px solid #333; padding: 10px 20px; display: flex; flex-direction: column; }
        .console-header { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        #errorLog { color: var(--error); font-family: 'Consolas', monospace; font-size: 0.9rem; white-space: pre-wrap; overflow-y: auto; flex-grow: 1; }

        #reportBtn { width: 100%; }
        .sync-ok { border-color: var(--accent) !important; color: var(--accent) !important; }
        .sync-fail { border-color: var(--error) !important; color: var(--error) !important; }

        #reportOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; padding: 50px; }
        .report-content { background: #111; border: 1px solid #444; border-radius: 8px; max-width: 800px; margin: auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: left; font-size: 0.85rem; }
    </style>
</head>
<body>

<header>
    <div class="brand"><h1>CodeFixer</h1></div>
    <div style="font-family: monospace; color: var(--accent);" id="codeVersionTag">Code Version: 1.0</div>
</header>

<div class="toolbar">
    <div class="btn" title="New" onclick="location.reload()">[+]</div>
    <select id="langSelect" style="background:#000; color:var(--accent); border:1px solid #444; padding:4px;">
        <option>json</option><option>js</option>
    </select>
    <div class="btn" title="The Magic Wand" onclick="magicWand()">[Magic Wand] 🪄</div>
    <div class="btn" title="Download" onclick="downloadText()">[V] Export</div>
</div>

<div class="main-layout">
    <textarea id="editor" spellcheck="false" placeholder='Paste JSON here...'></textarea>
    
    <div class="sidebar">
        <textarea id="instructionInput" placeholder="Surgical instructions..."></textarea>
        <button id="sendBtn" class="btn" style="height: 45px;">[>] SEND SURGERY</button>
        <button id="reportBtn" class="btn" onclick="document.getElementById('reportOverlay').style.display='block'">[Report]</button>
    </div>
</div>

<div class="console-area">
    <div class="console-header">
        <span>ERROR CONSOLE</span>
        <span style="cursor:pointer; color:var(--accent);" onclick="copyError()">[Copy Error]</span>
    </div>
    <div id="errorLog">Console ready...</div>
</div>

<div id="reportOverlay" onclick="this.style.display='none'">
    <div class="report-content" onclick="event.stopPropagation()">
        <h2 style="color:var(--accent); margin-top:0;">Correction Audit</h2>
        <table id="auditTable">
            <thead><tr><th>Line</th><th>Fix</th><th>Status</th></tr></thead>
            <tbody></tbody>
        </table>
        <button class="btn" style="margin-top:20px;" onclick="document.getElementById('reportOverlay').style.display='none'">Close</button>
    </div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    let codeVersion = 1.0;
    const els = {
        editor: document.getElementById('editor'),
        instruction: document.getElementById('instructionInput'),
        send: document.getElementById('sendBtn'),
        report: document.getElementById('reportBtn'),
        log: document.getElementById('errorLog'),
        audit: document.querySelector('#auditTable tbody'),
        verTag: document.getElementById('codeVersionTag')
    };

    // --- MAGIC WAND: Validate + Beautify + Colorize Reset ---
    window.magicWand = () => {
        const val = els.editor.value.trim();
        if (!val) return;
        
        try {
            // 1. Validate and Beautify (Step 1 & 2)
            const obj = JSON.parse(val);
            els.editor.value = JSON.stringify(obj, null, 4);
            
            // 2. Clear Errors
            els.log.innerText = "Success: JSON validated and beautified.";
            els.log.style.color = "var(--accent)";
            setReportStatus(true, "Mascara OK");
        } catch (e) {
            // 3. Detailed Error Reporting
            els.log.innerText = `JSON Error: ${e.message}`;
            els.log.style.color = "var(--error)";
            setReportStatus(false, "Syntax Error");
        }
    };

    window.copyError = () => {
        navigator.clipboard.writeText(els.log.innerText);
        const original = els.log.innerText;
        els.log.innerText = "Copied to clipboard!";
        setTimeout(() => els.log.innerText = original, 1000);
    };

    // --- SURGERY LOGIC ---
    async function getApiKey() {
        let key = sessionStorage.getItem('AI_DASH_KEY');
        if (!key) {
            key = prompt("Enter Gemini API Key:");
            if (key) sessionStorage.setItem('AI_DASH_KEY', key);
        }
        return key;
    }

    els.send.onclick = async () => {
        const key = await getApiKey();
        if (!key) return;

        const genAI = new GoogleGenerativeAI(key);
        const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash-preview" });

        els.send.disabled = true;
        els.report.innerText = "[Report] - Operating...";

        const prompt = `ACT AS aiDash CodeFixer. 
        CURRENT VERSION: ${codeVersion}
        FORMAT: JSON ONLY.
        {
          "version": "${codeVersion}",
          "fixes": [{ "line": number, "find": "string", "replace": "string", "prefix": "3 chars", "headline": "desc" }]
        }
        INSTRUCTION: ${els.instruction.value}
        CONTENT: \n${els.editor.value}`;

        try {
            const result = await model.generateContent(prompt);
            const data = JSON.parse(result.response.text().replace(/```json|```/g, ""));
            applySurgicalFixes(data);
        } catch (err) {
            els.log.innerText = `Surgery Error: ${err.message}`;
            setReportStatus(false, "Fix Failed");
        } finally {
            els.send.disabled = false;
        }
    };

    function applySurgicalFixes(data) {
        const lines = els.editor.value.split('\n');
        let successes = 0;
        els.audit.innerHTML = "";

        data.fixes.forEach(fix => {
            const lineIdx = fix.line - 1;
            const target = lines[lineIdx];
            if (target && target.includes(fix.find)) {
                lines[lineIdx] = target.replace(fix.find, fix.replace);
                successes++;
                els.audit.innerHTML += `<tr><td>${fix.line}</td><td>${fix.headline}</td><td style="color:var(--accent)">OK</td></tr>`;
            } else {
                els.audit.innerHTML += `<tr><td>${fix.line}</td><td>${fix.headline}</td><td style="color:var(--error)">Breach</td></tr>`;
            }
        });

        if (successes === data.fixes.length) {
            els.editor.value = lines.join('\n');
            codeVersion = (parseFloat(codeVersion) + 0.1).toFixed(1);
            els.verTag.innerText = `Code Version: ${codeVersion}`;
            setReportStatus(true, "All Fixes Applied");
        } else {
            setReportStatus(false, "Boundary Mismatch");
        }
    }

    function setReportStatus(ok, msg) {
        els.report.className = "btn " + (ok ? "sync-ok" : "sync-fail");
        els.report.innerText = `[Report] - ${msg}`;
    }

    window.downloadText = () => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([els.editor.value], {type:'text/plain'}));
        a.download = `aiDash_export.json`;
        a.click();
    };
</script>
</body>
</html>
