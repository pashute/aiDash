<!DOCTYPE html>
<html>
<head>
    <title>AI Mood Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #2d2d2d; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 450px; text-align: center; }
        input[type=range] { width: 100%; margin: 20px 0; accent-color: #00ff88; }
        .output-box { background: #3d3d3d; padding: 20px; border-radius: 10px; min-height: 100px; border-left: 4px solid #00ff88; text-align: left; line-height: 1.6; }
        .loading { color: #888; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎭 Sentiment Engine</h2>
    <p>Slide to change the vibe (0 = Sad, 100 = Happy)</p>
    <input type="range" id="moodSlider" min="0" max="100" value="50">
    
    <div class="output-box" id="displayArea">
        Move the slider to start our story...
    </div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    const API_KEY = "AIzaSyBzNgz_Q_1NAkUgq7JDz-NuoQt3l9JT2cY"; 
    const genAI = new GoogleGenerativeAI(API_KEY);
    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

    const slider = document.getElementById('moodSlider');
    const display = document.getElementById('displayArea');

    let timeout;

    slider.oninput = () => {
        display.innerHTML = '<span class="loading">Generating feeling...</span>';
        
        // Debounce: Wait for slider to stop moving for 500ms before calling AI
        clearTimeout(timeout);
        timeout = setTimeout(generateStory, 500);
    };

    async function generateStory() {
        const val = slider.value;
        const prompt = `The user's mood is at ${val} percent (0 is suicidal/depressed, 100 is euphoric/joyous). 
        Generate a single sentence in this EXACT format: 
        Because {vivid story about what happened}, I am now {what I am doing with that feeling}.`;

        try {
            const result = await model.generateContent(prompt);
            display.innerText = result.response.text();
        } catch (error) {
            display.innerText = "Error connecting to AI brain. Check your API key!";
        }
    }
</script>
</body>
</html>
