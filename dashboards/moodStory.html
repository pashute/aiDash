<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aiDash - moodStory v1.1.0</title>
    <style>
        :root { --accent: #00ff88; --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 40px; margin: 0; }
        .dashboard { background: var(--card); padding: 2.5rem; border-radius: 24px; width: 550px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 1px solid #333; position: relative; }
        .version-tag { position: absolute; top: 15px; right: 20px; font-size: 0.65rem; color: #555; font-family: monospace; }
        h2 { margin-top: 0; font-weight: 300; text-align: center; color: white; }
        
        .slider-container { margin: 40px 0; }
        .slider-wrapper { display: flex; align-items: center; gap: 15px; }
        .icon { font-size: 1.8rem; }
        
        input[type=range] { flex-grow: 1; accent-color: var(--accent); cursor: pointer; }
        
        datalist { display: flex; justify-content: space-between; margin-top: 10px; padding: 0 45px; color: #555; font-size: 0.7rem; }
        .large-notch { font-weight: bold; color: var(--accent); }

        .display-area { background: #181818; padding: 25px; border-radius: 15px; border-top: 1px solid #333; line-height: 1.7; min-height: 160px; font-size: 1.1rem; }
        b { color: var(--accent); font-weight: 500; transition: opacity 0.3s; }
        
        .loading-pulse { opacity: 0.3; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 1; } }

        .meta-info { margin-top: 15px; font-size: 0.75rem; color: #555; text-transform: uppercase; text-align: right; font-weight: bold; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="version-tag">aiDash Engine v1.1.0</div>
    <h2>🎭 moodStory</h2>
    
    <div class="slider-container">
        <div class="slider-wrapper">
            <span class="icon">😢</span>
            <input type="range" id="moodSlider" min="0" max="100" value="50" list="markers">
            <span class="icon">😊</span>
        </div>
        <datalist id="markers">
            <option value="0" label="|"></option>
            <option value="25" label="|"></option>
            <option value="50" label="|" class="large-notch"></option>
            <option value="75" label="|"></option>
            <option value="100" label="|"></option>
        </datalist>
    </div>

    <div class="display-area" id="output">
        Because <b id="story">...</b>, I am <b id="mood">...</b> and <b id="reaction">...</b>.
    </div>
    <div id="meta" class="meta-info">System Ready</div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    const API_KEY = "YOUR_API_KEY_HERE"; 
    const genAI = new GoogleGenerativeAI(API_KEY);
    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

    // --- ENHANCED EXAMPLE LIBRARY ---
    const examples = {
        simple: {
            sentence: { story: "I found a forgotten $20 bill in my winter coat", mood: "genuinely cheerful", reaction: "whistling a tune" },
            paragraph: { story: "The sun came out right as I stepped outside. The birds started singing and the air smelled like fresh rain on the pavement.", mood: "lighthearted", reaction: "walking with a little extra spring in my step" },
            story: { story: "I woke up early and realized I had nothing on my schedule. I made a perfect cup of coffee, sat on the porch, and just watched the neighborhood wake up slowly.", mood: "calm and content", reaction: "taking a slow, deep breath of fresh air" }
        },
        complex: {
            sentence: { story: "A single letter arrived, bearing the wax seal of a forgotten era", mood: "steeped in nostalgic curiosity", reaction: "tracing the indentation with a trembling finger" },
            paragraph: { story: "The morning mist finally surrendered to a golden, uncompromising sun, revealing the garden in a sudden, vivid burst of dew-covered emeralds and blooming jasmine.", mood: "profoundly harmonious with the universe", reaction: "allowing my spirit to expand into the quiet warmth" },
            story: { story: "After three years of silent corridors and dusty manuscripts, the letter arrived with the official seal I had dreamt of. It wasn't just a job offer; it was a homecoming to the ivory towers, a validation of every midnight candle burned.", mood: "electrified by hard-won triumph", reaction: "watching the city lights flicker to life like a celebration" }
        }
    };

    const slider = document.getElementById('moodSlider');
    const meta = document.getElementById('meta');
    const els = { story: document.getElementById('story'), mood: document.getElementById('mood'), reaction: document.getElementById('reaction') };

    let debounceTimer;

    slider.addEventListener('input', () => {
        Object.values(els).forEach(el => el.classList.add('loading-pulse'));
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(runPipeline, 700);
    });

    async function runPipeline() {
        const val = slider.value;
        const comp = Math.random() > 0.5 ? 'complex' : 'simple';
        const lens = ['sentence', 'paragraph', 'story'];
        const len = lens[Math.floor(Math.random() * lens.length)];
        
        meta.innerText = `Mode: ${comp} ${len}`;

        const ex = examples[comp][len];

        try {
            // Stage 1: Mood
            const moodRes = await model.generateContent(`Score: ${val}/100. Give one ${comp} adjective/state. No period. Ex: ${ex.mood}`);
            const moodText = moodRes.response.text().trim().toLowerCase();
            updateSection('mood', moodText);

            // Stage 2: Story
            const storyRes = await model.generateContent(`Mood: ${moodText}. Write a ${comp} ${len} backstory. 
            Format: Only the story. No "Because". Example: "${ex.story}"`);
            updateSection('story', storyRes.response.text().trim());

            // Stage 3: Reaction
            const reactRes = await model.generateContent(`Mood: ${moodText}. Give a ${comp} reaction. No period. 
            Example: "${ex.reaction}"`);
            updateSection('reaction', reactRes.response.text().trim());

        } catch (err) {
            meta.innerText = "API Error";
        }
    }

    function updateSection(id, text) {
        els[id].innerText = text;
        els[id].classList.remove('loading-pulse');
    }
</script>

</body>
</html>
