<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aiDash - moodStory v2.1</title>
    <style>
        :root { --accent: #00ff88; --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --sad-blue: #3498db; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        
        .dashboard { background: var(--card); padding: 2rem; border-radius: 24px; width: 750px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 1px solid #333; position: relative; display: grid; grid-template-columns: 80px 1fr; gap: 20px; }
        .version-tag { position: absolute; top: 10px; right: 20px; font-size: 0.65rem; color: #f5f5f5; font-family: monospace; opacity: 0.7; }
        
        /* Slider & Layout */
        .slider-box { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        input[type=range].vertical { appearance: none; width: 8px; height: 350px; background: linear-gradient(to top, var(--sad-blue), var(--accent)); border-radius: 5px; writing-mode: bt-lr; appearance: slider-vertical; cursor: pointer; }
        .icon { font-size: 1.5rem; }
        .main-content { display: flex; flex-direction: column; gap: 20px; }
        
        /* 6-Step Granular Progress Bar */
        .progress-container { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; height: 10px; }
        .step { background: #222; border-radius: 2px; transition: all 0.2s ease; border: 1px solid #333; }
        .step.active { background: var(--accent); box-shadow: 0 0 10px var(--accent); border-color: white; }

        .display-area { background: #0a0a0a; padding: 30px; border-radius: 15px; border: 1px solid #333; line-height: 1.8; min-height: 100px; font-size: 1.2rem; }
        b { color: var(--accent); }
        .loading-pulse { animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.3; } }

        button#trigger { align-self: flex-start; background: transparent; color: var(--accent); border: 2px solid var(--accent); padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        button#trigger:hover { background: var(--accent); color: #000; }

        .console { background: #000; color: #00ff00; font-family: 'Courier New', monospace; font-size: 0.8rem; padding: 15px; border-radius: 8px; height: 140px; overflow-y: auto; border: 1px solid #222; margin-top: 10px; border-left: 3px solid var(--accent); }
        
        /* Secure Modal */
        #apiModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid var(--accent); width: 380px; text-align: center; }
        #apiKeyInput { width: 100%; padding: 12px; background: #000; color: white; border: 1px solid #444; margin: 20px 0; border-radius: 5px; }
    </style>
</head>
<body>
<div id="auth-wall" style="display:none; position:fixed; inset:0; background:#000; color:#fff; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:monospace; text-align:center; padding:20px;">
    <h1 style="color:#ff4444;">[!] ACCESS DENIED</h1>
    <p style="font-size:1.2rem;">This aiDash should be used from the main menu.</p>
    <button onclick="location.href='../index.html'" style="margin-top:20px; background:#222; color:#00ff88; border:1px solid #00ff88; padding:10px 20px; cursor:pointer;">Return to Main Menu</button>
</div>
<script>
   const authWall = document.getElementById('auth-wall');

    // 1. Get the URL of the page the user came from
    const referrer = document.referrer;
    
    // 2. Define your valid entry point (The Hub)
    // This checks if the referrer string contains your domain's index
    const isFromHub = referrer.includes('aidashboards.vercel.app') && 
                     (referrer.endsWith('/') || referrer.includes('index.html'));

    if (!isFromHub) {
        // Show the wall and stop any further scripts from running
        authWall.style.display = 'flex';
        window.stop(); 
    } else {  // everything's ok
       // Remove the wall element so it doesn't interfere with the UI
       authWall.remove();
    }
</script>


<div class="dashboard">
    <div class="version-tag" id="dynamicVersion"></div>
    <div class="slider-box">
        <span class="icon">😊</span>
        <input type="range" id="moodSlider" class="vertical" min="0" max="100" value="50">
        <span class="icon">😢</span>
        <button id="trigger">Generate</button>
    </div>

    <div class="main-content">
        <div class="progress-container">
            <div class="step" title="TX 1"></div><div class="step" title="RX 1"></div>
            <div class="step" title="TX 2"></div><div class="step" title="RX 2"></div>
            <div class="step" title="TX 3"></div><div class="step" title="RX 3"></div>
        </div>
        <div class="display-area" id="output">
            Because <b id="story">...</b>, I am <b id="mood">...</b> and <b id="reaction">...</b>.
        </div>
        <div class="console" id="consoleLog"></div>
    </div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    let genAI, model;
    let moodHistory = JSON.parse(localStorage.getItem('mood_history')) || [];

    const els = {
        story: document.getElementById('story'),
        mood: document.getElementById('mood'),
        reaction: document.getElementById('reaction'),
        slider: document.getElementById('moodSlider'),
        btn: document.getElementById('trigger'),
        console: document.getElementById('consoleLog'),
        steps: document.querySelectorAll('.step'),
        modal: document.getElementById('apiModal'),
        keyInput: document.getElementById('apiKeyInput'),
        version: document.getElementById('dynamicVersion')
    };

    els.version.innerText = document.title;

    function initAPI() {
        const key = sessionStorage.getItem('AI_DASH_KEY');
        if (!key) {
            els.modal.style.display = 'flex';
        } else {
            genAI = new GoogleGenerativeAI(key);
            model = genAI.getGenerativeModel({ model: "gemini-3-flash-preview" });
            log("BOOT", "Sequential Logic Core Online.");
        }
    }

    document.getElementById('saveKey').onclick = () => {
        sessionStorage.setItem('AI_DASH_KEY', els.keyInput.value.trim());
        els.modal.style.display = 'none';
        initAPI();
    };

    function log(type, msg) {
        const time = new Date().toLocaleTimeString().split(' ')[0];
        els.console.innerHTML = `<div>[${time}] <b>${type}:</b> ${msg}</div>` + els.console.innerHTML;
    }

    const askAI = async (prompt) => {
        const key = sessionStorage.getItem('GEMINI_KEY');
        const response = await fetch('/api/init', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt, apiKey: key })
            });
            if (!response.ok) throw new Error('Proxy error');
            const data = await response.json();
            // Assuming your proxy returns { text: "..." } or similar
            return data.text || data; 
    };
    
    function setStep(idx) {
        els.steps.forEach((s, i) => s.classList.toggle('active', i === idx));
    }

    els.btn.onclick = async () => {
        const score = els.slider.value;
        const style = score > 50 ? 'poetic and expansive' : 'gritty and minimal';
        const avoidList = moodHistory.length > 0 ? `Avoid these words: ${moodHistory.join(', ')}.` : "";
        
        [els.story, els.mood, els.reaction].forEach(el => {
            el.innerText = "...";
            el.classList.add('loading-pulse');
        });

        try {
            // STEP 1: Backstory
            setStep(0); // TX 1
            const prompt1 = `Part 1 of 3. Score: ${score}/100. Write a ${style} backstory fragment starting after "Because". NO caps, NO period.`;
            const res1 = await askAI(prompt1);
            setStep(1); // RX 1
            const storyText = res1.response.text().trim().toLowerCase();
            els.story.innerText = storyText;
            els.story.classList.remove('loading-pulse');

            // STEP 2: The Mood (Memory Aware)
            setStep(2); // TX 2
            const prompt2 = `Part 2 of 3. Context: "Because ${storyText}". Provide one adjective/state for "I am". ${avoidList} NO caps, NO period.`;
            const res2 = await askAI(prompt2);
            setStep(3); // RX 2
            const moodText = res2.response.text().trim().toLowerCase();
            els.mood.innerText = moodText;
            els.mood.classList.remove('loading-pulse');

            // Store in Local Memory
            moodHistory.push(moodText);
            if(moodHistory.length > 20) moodHistory.shift();
            localStorage.setItem('mood_history', JSON.stringify(moodHistory));

            // STEP 3: Reaction
            setStep(4); // TX 3
            const prompt3 = `Part 3 of 3. Context: "Because ${storyText}, I am ${moodText} and...". Provide a seamless physical reaction. NO caps, NO period.`;
            const res3 = await askAI(prompt2);
            setStep(5); // RX 3
            const reactText = res3.response.text().trim().toLowerCase();
            els.reaction.innerText = reactText;
            els.reaction.classList.remove('loading-pulse');

        } catch (err) {
            log("ERR", err.message);
        } finally {
            setTimeout(() => els.steps.forEach(s => s.classList.remove('active')), 1500);
        }
    };

</script>
</body>
</html>
