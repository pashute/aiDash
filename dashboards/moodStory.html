<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aiDash - moodStory v1.2.3</title>
    <style>
        :root { --accent: #00ff88; --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --sad-blue: #3498db; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        
        .dashboard { background: var(--card); padding: 2rem; border-radius: 24px; width: 700px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 1px solid #333; position: relative; display: grid; grid-template-columns: 80px 1fr; gap: 20px; }
        .version-tag { position: absolute; top: 10px; right: 20px; font-size: 0.65rem; color: #f5f5f5; font-family: monospace; }
        
        /* Vertical Slider Styling */
        .slider-box { display: flex; flex-direction: column; align-items: center; gap: 10px; position: relative; }
        input[type=range].vertical { appearance: none; width: 8px; height: 300px; background: linear-gradient(to top, var(--sad-blue), var(--accent)); border-radius: 5px; writing-mode: bt-lr; /* Webkit */ appearance: slider-vertical; }
        .icon { font-size: 1.5rem; }

        .main-content { display: flex; flex-direction: column; gap: 20px; }
        
        /* Progress Bar */
        .progress-container { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; height: 10px; }
        .step { background: #333; border-radius: 2px; transition: background 0.3s; }
        .step.active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        .display-area { background: #181818; padding: 25px; border-radius: 15px; border: 1px solid #333; line-height: 1.7; min-height: 120px; font-size: 1.1rem; }
        b { color: var(--accent); }
        .loading-pulse { animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.3; } }

        button#trigger { align-self: flex-start; background: #333; color: var(--accent); border: 1px solid var(--accent); padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button#trigger:hover { background: var(--accent); color: #000; }

        /* Console styling */
        .console-wrapper { margin-top: 20px; }
        .console-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; font-size: 0.7rem; color: #666; }
        .console { background: #000; color: #00ff00; font-family: 'Courier New', monospace; font-size: 0.8rem; padding: 15px; border-radius: 8px; height: 150px; overflow-y: auto; border: 1px solid #222; }
        .log-entry { margin-bottom: 8px; border-bottom: 1px solid #111; padding-bottom: 4px; }
        .timestamp { color: #888; margin-right: 10px; }
        .clear-btn { background: none; border: 1px solid #444; color: #666; font-size: 0.6rem; cursor: pointer; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="version-tag">aiDash v1.2.3</div>
    
    <div class="slider-box">
        <span class="icon">😊</span>
        <input type="range" id="moodSlider" class="vertical" min="0" max="100" value="50" step="1">
        <span class="icon">😢</span>
        <button id="trigger">Tell me about it</button>
    </div>

    <div class="main-content">
        <div class="progress-container" id="progressBar">
            <div class="step"></div><div class="step"></div><div class="step"></div>
            <div class="step"></div><div class="step"></div><div class="step"></div>
        </div>

        <div class="display-area" id="output">
            Because <b id="story">...</b>, I am <b id="mood">...</b> and <b id="reaction">...</b>.
        </div>

        <div class="console-wrapper">
            <div class="console-header">
                <span>SYSTEM LOG</span>
                <button class="clear-btn" id="clearConsole">CLEAR</button>
            </div>
            <div class="console" id="consoleLog"></div>
        </div>
    </div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    const API_KEY = "AIzaSyBzNgz_Q_1NAkUgq7JDz-NuoQt3l9JT2cY"; 
    const genAI = new GoogleGenerativeAI(API_KEY);
    const model = genAI.getGenerativeModel({ model: "gemini-3-flash-preview" });

    const els = {
        story: document.getElementById('story'),
        mood: document.getElementById('mood'),
        reaction: document.getElementById('reaction'),
        slider: document.getElementById('moodSlider'),
        btn: document.getElementById('trigger'),
        console: document.getElementById('consoleLog'),
        steps: document.querySelectorAll('.step')
    };

    document.getElementById('clearConsole').onclick = () => els.console.innerHTML = '';

    function log(type, msg) {
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        const time = new Date().toLocaleTimeString().split(' ')[0];
        entry.innerHTML = `<span class="timestamp">[${time}]</span> <strong>${type}:</strong> ${msg}`;
        els.console.prepend(entry);
    }

    function setStep(index) {
        els.steps.forEach((s, i) => s.classList.toggle('active', i === index));
    }

    els.btn.addEventListener('click', runPipeline);

    async function runPipeline() {
        const val = els.slider.value;
        const comp = Math.random() > 0.5 ? 'complex' : 'simple';
        const len = ['sentence', 'paragraph', 'story'][Math.floor(Math.random() * 3)];
        
        Object.values(els).forEach(el => el.classList?.add('loading-pulse'));
        
        try {
            // STEP 1: Sending Mood Prompt
            setStep(0);
            const p1 = `Mood score ${val}/100. One ${comp} adjective.`;
            log("TX_MOOD", p1);
            
            // STEP 2: Receiving Mood
            const r1 = await model.generateContent(p1);
            setStep(1);
            const moodText = r1.response.text().trim().toLowerCase();
            log("RX_MOOD", moodText);
            els.mood.innerText = moodText;

            // STEP 3: Sending Story Prompt
            setStep(2);
            const p2 = `Write a ${comp} ${len} backstory for mood: ${moodText}. No "Because".`;
            log("TX_STORY", p2);

            // STEP 4: Receiving Story
            const r2 = await model.generateContent(p2);
            setStep(3);
            const storyText = r2.response.text().trim();
            log("RX_STORY", storyText);
            els.story.innerText = storyText;

            // STEP 5: Sending Reaction Prompt
            setStep(4);
            const p3 = `Physical reaction for mood: ${moodText}. ${comp}.`;
            log("TX_REACT", p3);

            // STEP 6: Receiving Reaction
            const r3 = await model.generateContent(p3);
            setStep(5);
            const reactText = r3.response.text().trim();
            log("RX_REACT", reactText);
            els.reaction.innerText = reactText;

        } catch (err) {
            log("ERROR", err.message);
        } finally {
            Object.values(els).forEach(el => el.classList?.remove('loading-pulse'));
            setTimeout(() => setStep(-1), 1000);
        }
    }
</script>

</body>
</html>
